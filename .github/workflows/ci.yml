name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # `npm ci` (not --ignore-scripts) so the substrate dep's `prepare`
      # script runs to build its dist/ tree — the extension imports type
      # declarations from there, which typecheck needs.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck (src + test)
        run: npm run typecheck

      - name: Test (mocha unit + equivalence, hermetic)
        run: npm test
